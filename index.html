<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CalculadoraHTTP</title>
</head>
<body>
  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora HTTP</title>
</head>
<body>

    <div class="card">
        <h2>Minha Calculadora Node.js</h2>
        <input type="number" id="numA" placeholder="Número A">
        <input type="number" id="numB" placeholder="Número B">
        
        <select id="operacao">
            <option value="soma">Soma</option>
            <option value="subtracao">Subtração</option>
            <option value="multiplicacao">Multiplicação</option>
            <option value="divisao">Divisão</option>
            <option value="potencia">Potência</option>
            <option value="resto">Resto</option>
        </select>

        <button onclick="calcular()">Calcular</button>

        <p>Resultado: <span id="resultado">-</span></p>
    </div>

    <script>
        async function calcular() {
            const a = document.getElementById('numA').value;
            const b = document.getElementById('numB').value;
            const operacao = document.getElementById('operacao').value;
            const display = document.getElementById('resultado');

            if (a === '' || b === '') {
                alert("Por favor, preencha os dois números.");
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/${operacao}?a=${a}&b=${b}`);
                const data = await response.json();

                display.innerText = data.resultado;
            } catch (error) {
                display.innerText = "Erro ao conectar com o servidor";
                console.error(error);
            }
        }
    </script>
</body>
</html>
</body>
</html>
